# Dovecot mail location — Maildir format under /var/mail/<user>/Maildir
mail_location = maildir:/var/mail/%u/Maildir

# Create INBOX on first login
namespace inbox {
  inbox = yes
  mailbox INBOX {
    auto = create
  }
  mailbox Drafts {
    auto = subscribe
    special_use = \Drafts
  }
  mailbox Sent {
    auto = subscribe
    special_use = \Sent
  }
  mailbox Trash {
    auto = subscribe
    special_use = \Trash
  }
}
