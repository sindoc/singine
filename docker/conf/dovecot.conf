# Dovecot main config — singine mail server
# Minimal IMAP4rev1 server for local dev + MailClient.java integration

protocols = imap

# Listen on all interfaces
listen = *

# Log to stderr (Docker will capture)
log_path = /dev/stderr
info_log_path = /dev/stderr
debug_log_path = /dev/stderr

# IMAP port 143 (plain) + 993 (TLS)
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

# Postfix SASL socket (for smtpd_sasl_type = dovecot)
service auth {
  unix_listener /var/spool/postfix/private/auth {
    mode = 0666
    user = postfix
    group = postfix
  }
}

# SSL cert (self-signed, generated in Dockerfile)
ssl = yes
ssl_cert = </etc/dovecot/dovecot.pem
ssl_key  = </etc/dovecot/private/dovecot.key

# Include modular config
!include conf.d/*.conf
