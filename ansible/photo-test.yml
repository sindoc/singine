---
- name: Run Singine photo workflow tests locally
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run photo unittest module
      ansible.builtin.command:
        argv:
          - python3
          - -m
          - unittest
          - py.tests.test_photo
          - -v
      args:
        chdir: "{{ playbook_dir }}/.."
