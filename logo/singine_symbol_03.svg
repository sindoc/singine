      <ellipse cx="78" cy="43" rx="42" ry="16" fill="none" stroke="#27221f" stroke-width="4"/>
      <path d="M 36 43 V 74 C 36 83 55 90 78 90 C 101 90 120 83 120 74 V 43" fill="none" stroke="#27221f" stroke-width="4"/>
      <path d="M 36 58 C 36 67 55 74 78 74 C 101 74 120 67 120 58" fill="none" stroke="#27221f" stroke-width="4"/>
      <text x="26" y="138" class="label" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="600">Structured Data</text>
    </g>

    <g transform="translate(142 432)">
