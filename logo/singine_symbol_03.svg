      <path d="M 32 82 L 52 40 L 80 64 L 104 28 L 124 82" fill="none" stroke="#27221f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="52" cy="40" r="6" fill="#7f2f23"/>
      <circle cx="80" cy="64" r="6" fill="#7f2f23"/>
      <circle cx="104" cy="28" r="6" fill="#7f2f23"/>
      <text x="27" y="138" class="label" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="600">Observed State</text>
    </g>

    <g transform="translate(334 432)">
      <rect width="156" height="112" rx="24" fill="#f7f1e8" stroke="#c7b4a1" stroke-width="2"/>
      <path d="M 34 78 C 52 36 104 36 122 78" fill="none" stroke="#27221f" stroke-width="5"/>
      <path d="M 44 78 C 58 52 98 52 112 78" fill="none" stroke="#7f2f23" stroke-width="5"/>
      <circle cx="78" cy="30" r="10" fill="none" stroke="#27221f" stroke-width="4"/>
      <text x="42" y="138" class="label" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="600">Identity</text>
    </g>

    <g transform="translate(238 582)">
      <rect width="156" height="84" rx="24" fill="#7f2f23"/>
      <text x="28" y="52" class="label" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#f7f1e8" style="fill:#f7f1e8">many inputs</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <path d="M 642 300 L 842 238 L 1042 300 L 1108 450 L 1042 600 L 842 662 L 642 600 L 576 450 Z" fill="url(#engineFill)"/>
    <path d="M 690 333 L 842 286 L 994 333 L 1044 450 L 994 567 L 842 614 L 690 567 L 640 450 Z" fill="none" stroke="#ba9d7d" stroke-width="2" opacity="0.55"/>
  </g>

  <g>
    <path d="M 842 326 L 925 450 L 842 574 L 759 450 Z" fill="none" stroke="#f5e9d7" stroke-width="14" stroke-linejoin="round"/>
    <path d="M 802 450 H 882" stroke="#f5e9d7" stroke-width="14" stroke-linecap="round"/>
    <path d="M 842 410 V 490" stroke="#7f2f23" stroke-width="10" stroke-linecap="round"/>
    <circle cx="842" cy="450" r="122" fill="none" stroke="#7f2f23" stroke-width="2" opacity="0.45" stroke-dasharray="10 12"/>
    <text x="759" y="716" class="label" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="600">bounded core</text>
    <text x="708" y="744" class="small" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="500">inspect • route • constrain • execute</text>
    <text x="723" y="772" class="tiny" font-family="Courier, monospace" font-size="16" font-weight="500">agent shell / service bridge / query layer</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 522 338 C 592 338 630 334 676 344" stroke="#7f2f23" stroke-width="8" marker-end="url(#flowArrow)"/>
    <path d="M 522 488 C 592 488 628 494 674 480" stroke="#7f2f23" stroke-width="8" marker-end="url(#flowArrow)"/>
    <path d="M 522 624 C 596 624 632 604 680 566" stroke="#7f2f23" stroke-width="8" marker-end="url(#flowArrow)"/>

    <path d="M 1004 344 C 1060 336 1100 336 1170 338" stroke="#23201d" stroke-width="8" marker-end="url(#signalArrow)"/>
    <path d="M 1010 480 C 1084 486 1110 490 1170 490" stroke="#23201d" stroke-width="8" marker-end="url(#signalArrow)"/>
    <path d="M 1000 564 C 1060 594 1104 620 1170 624" stroke="#23201d" stroke-width="8" marker-end="url(#signalArrow)"/>
  </g>

  <g>
    <rect x="1072" y="248" width="418" height="452" rx="36" fill="url(#fieldFill)" stroke="#ccbba8" stroke-width="2"/>

    <g transform="translate(1106 282)">
      <rect width="156" height="112" rx="24" fill="#f7f1e8" stroke="#c7b4a1" stroke-width="2"/>
      <path d="M 40 74 H 116 M 58 50 L 40 74 L 58 98" fill="none" stroke="#27221f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="38" y="138" class="label" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="600">CLI Actions</text>
    </g>

    <g transform="translate(1298 282)">
      <rect width="156" height="112" rx="24" fill="#f7f1e8" stroke="#c7b4a1" stroke-width="2"/>
      <path d="M 34 78 H 122 M 54 54 V 102 M 82 42 V 102" stroke="#27221f" stroke-width="5" stroke-linecap="round"/>
      <text x="36" y="138" class="label" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="600">Runtime Control</text>
    </g>

    <g transform="translate(1106 432)">
      <rect width="156" height="112" rx="24" fill="#f7f1e8" stroke="#c7b4a1" stroke-width="2"/>
      <path d="M 34 84 H 122 M 34 56 H 122 M 34 28 H 122" stroke="#27221f" stroke-width="5" stroke-linecap="round"/>
      <circle cx="48" cy="28" r="7" fill="#7f2f23"/>
      <circle cx="86" cy="56" r="7" fill="#7f2f23"/>
      <circle cx="108" cy="84" r="7" fill="#7f2f23"/>
      <text x="21" y="138" class="label" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="600">SQL / SPARQL / GraphQL</text>
    </g>

    <g transform="translate(1298 432)">
      <rect width="156" height="112" rx="24" fill="#f7f1e8" stroke="#c7b4a1" stroke-width="2"/>
      <path d="M 78 26 V 84 M 48 44 L 78 26 L 108 44 M 48 66 L 78 84 L 108 66" fill="none" stroke="#27221f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="41" y="138" class="label" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="600">Bridge APIs</text>
    </g>

    <g transform="translate(1202 582)">
      <rect width="156" height="84" rx="24" fill="#171717"/>
      <text x="19" y="52" class="label" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#f7f1e8" style="fill:#f7f1e8">safe surfaces</text>
    </g>
  </g>

  <g>
    <path d="M 516 744 H 1084" stroke="#baa38a" stroke-width="2"/>
    <text x="610" y="808" class="small" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="500">The value is not just “AI output”. It is governed movement:</text>
    <text x="530" y="842" class="tiny" font-family="Courier, monospace" font-size="16" font-weight="500">heterogeneous local sources  ->  inspectable orchestration core  ->  precise execution and query interfaces</text>
  </g>
</svg>
