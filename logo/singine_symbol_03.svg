<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Singine technical symbol concept</title>
  <desc id="desc">A technical diagrammatic symbol showing Singine as a bounded orchestration engine between local sources and execution and query surfaces.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4efe6"/>
      <stop offset="55%" stop-color="#ece4d6"/>
      <stop offset="100%" stop-color="#e2d7c5"/>
    </linearGradient>

    <linearGradient id="engineFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#171717"/>
      <stop offset="100%" stop-color="#2e2a27"/>
    </linearGradient>

    <linearGradient id="fieldFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#efe8db" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#47372a" flood-opacity="0.16"/>
    </filter>

    <marker id="flowArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#7f2f23"/>
    </marker>

    <marker id="signalArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#23201d"/>
    </marker>

    <style>
      .headline { letter-spacing: 0.02em; fill: #171717; }
      .subline { letter-spacing: 0.03em; fill: #5c5147; }
      .section { letter-spacing: 0.16em; fill: #7f2f23; }
      .label { letter-spacing: 0.02em; fill: #201d1a; }
      .small { letter-spacing: 0.02em; fill: #5c5147; }
      .tiny { letter-spacing: 0.04em; fill: #7a6f63; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g opacity="0.38">
    <circle cx="1340" cy="160" r="220" fill="#ffffff"/>
    <circle cx="260" cy="760" r="260" fill="#f7f2eb"/>
  </g>

  <g opacity="0.14" stroke="#8d7f73" stroke-width="1.5" fill="none">
    <path d="M 120 230 H 1480"/>
    <path d="M 120 450 H 1480"/>
    <path d="M 120 670 H 1480"/>
    <path d="M 290 120 V 820"/>
    <path d="M 800 120 V 820"/>
    <path d="M 1310 120 V 820"/>
  </g>

  <text x="120" y="104" class="headline" font-family="Helvetica, Arial, sans-serif" font-size="72" font-weight="700">Singine</text>
  <text x="120" y="144" class="subline" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="500">bounded orchestration for local knowledge, runtime control, and multi-query access</text>

  <text x="120" y="212" class="section" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">LOCAL INPUTS</text>
  <text x="690" y="212" class="section" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">ENGINE</text>
  <text x="1180" y="212" class="section" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">CONTROLLED OUTPUTS</text>

  <g>
    <rect x="108" y="248" width="418" height="452" rx="36" fill="url(#fieldFill)" stroke="#ccbba8" stroke-width="2"/>
    <rect x="108" y="722" width="418" height="80" rx="24" fill="#f8f3ec" stroke="#ccbba8" stroke-width="2"/>
    <text x="140" y="771" class="tiny" font-family="Courier, monospace" font-size="16" font-weight="500">filesystem  /  logseq  /  sqlite  /  rdf  /  auth-state  /  runtime</text>

    <g transform="translate(142 282)">
      <rect width="156" height="112" rx="24" fill="#f7f1e8" stroke="#c7b4a1" stroke-width="2"/>
      <path d="M 30 38 H 126 M 30 58 H 126 M 30 78 H 98" stroke="#27221f" stroke-width="5" stroke-linecap="round"/>
      <text x="22" y="138" class="label" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="600">Documents</text>
